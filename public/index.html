<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interest Tutorial Hub</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="Interest Hub">
          <span class="brand-mark" id="brandMark">Hub</span>
          <div>
            <p class="eyebrow">Interest Hub</p>
            <h1 id="brandTitle">Loading interests</h1>
          </div>
        </div>

        <form class="search" id="searchForm" role="search">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.3-4.3m2.3-5.2a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" />
          </svg>
          <input id="searchInput" type="search" placeholder="Search tutorials, channels, tags" autocomplete="off" />
        </form>

        <button class="icon-button refresh-button" id="refreshButton" type="button" title="Refresh from YouTube">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 0 1-15.4 6.4M3 12A9 9 0 0 1 18.4 5.6M18 2v4h-4M6 22v-4h4" />
          </svg>
          <span>Refresh</span>
        </button>

        <div class="auth-panel" id="authPanel"></div>
      </header>

      <aside class="filter-panel" aria-label="Tutorial filters">
        <section class="interest-section">
          <div class="filter-heading">
            <h2>Interests</h2>
            <button class="mini-icon-button" id="showInterestFormButton" type="button" title="Add interest">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>
          <div class="interest-list" id="interestList"></div>
          <form class="interest-form is-hidden" id="interestForm">
            <label>
              <span>Name</span>
              <input id="interestNameInput" type="text" placeholder="OpenAI Codex" autocomplete="off" />
            </label>
            <label>
              <span>Searches</span>
              <textarea id="interestQueriesInput" rows="4" placeholder="OpenAI Codex tutorial&#10;Codex CLI tutorial"></textarea>
            </label>
            <label>
              <span>Topics</span>
              <input id="interestTopicsInput" type="text" placeholder="Codex, AI Coding, CLI" autocomplete="off" />
            </label>
            <label>
              <span>Trusted channels</span>
              <textarea id="interestChannelsInput" rows="3" placeholder="OpenAI&#10;OpenAI Developers"></textarea>
            </label>
            <div class="interest-form-actions">
              <button class="state-button compact" type="submit">Add</button>
              <button class="state-button compact" id="cancelInterestFormButton" type="button">Cancel</button>
            </div>
          </form>
        </section>

        <div class="status-block">
          <p class="status-label">Cache</p>
          <p class="status-value" id="cacheStatus">Loading</p>
          <p class="status-note" id="apiStatus">Checking API</p>
        </div>

        <section class="filter-group">
          <h2>Topic</h2>
          <div class="chip-list" id="topicFilters"></div>
        </section>

        <section class="filter-group">
          <h2>Quality</h2>
          <div class="segmented" role="group" aria-label="Quality filter">
            <button type="button" class="segment is-active" data-filter="quality" data-value="all">All</button>
            <button type="button" class="segment" data-filter="quality" data-value="trusted">Trusted</button>
            <button type="button" class="segment" data-filter="quality" data-value="embeddable">Embed</button>
          </div>
        </section>

        <section class="filter-group">
          <h2>Progress</h2>
          <label class="toggle-row">
            <span>Saved only</span>
            <input id="savedToggle" type="checkbox" />
          </label>
          <label class="toggle-row">
            <span>Unwatched only</span>
            <input id="unwatchedToggle" type="checkbox" />
          </label>
        </section>

        <section class="filter-group">
          <h2>Length</h2>
          <select id="durationSelect">
            <option value="all">Any length</option>
            <option value="short">Under 10 min</option>
            <option value="medium">10-30 min</option>
            <option value="long">30+ min</option>
          </select>
        </section>

        <section class="filter-group">
          <h2>Channel</h2>
          <select id="channelSelect">
            <option value="all">All channels</option>
          </select>
        </section>
      </aside>

      <main class="content">
        <section class="results-header">
          <div>
            <p class="eyebrow">Latest tutorials</p>
            <h2 id="resultsTitle">Loading videos</h2>
          </div>
          <p id="resultsMeta" class="muted"></p>
        </section>

        <section class="tutorial-grid" id="tutorialGrid" aria-live="polite"></section>
      </main>

      <aside class="watch-panel" aria-label="Selected tutorial">
        <div class="watch-frame" id="watchFrame"></div>
        <div class="watch-details">
          <div class="watch-title-row">
            <div>
              <p class="eyebrow" id="selectedChannel">No video selected</p>
              <h2 id="selectedTitle">Pick a tutorial</h2>
            </div>
            <a id="youtubeLink" class="icon-link" href="#" target="_blank" rel="noreferrer" title="Open on YouTube">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M7 17 17 7M9 7h8v8" />
              </svg>
            </a>
          </div>
          <p id="selectedDescription" class="description">The latest cached tutorials will appear here after your first refresh.</p>
          <div class="tag-row" id="selectedTags"></div>
          <div class="watch-actions">
            <button type="button" class="state-button" id="saveButton">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2Z" />
              </svg>
              <span>Save</span>
            </button>
            <button type="button" class="state-button" id="watchedButton">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 6 9 17l-5-5" />
              </svg>
              <span>Watched</span>
            </button>
          </div>
        </div>
      </aside>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
