name: InterestHubiOS
options:
  deploymentTarget:
    iOS: 17.0
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES

targets:
  InterestHubiOS:
    type: application
    platform: iOS
    bundleId: com.momentum.interesthub
    sources:
      - path: Sources
        type: syncedFolder
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.momentum.interesthub
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  InterestHubiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        type: syncedFolder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.momentum.interesthub.Tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: InterestHubiOS

schemes:
  InterestHubiOS:
    shared: true
    build:
      targets:
        InterestHubiOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - InterestHubiOSTests
