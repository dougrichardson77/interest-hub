services:
  - type: web
    name: interest-tutorial-hub-production
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 0.1.0
      - key: MIN_CLIENT_VERSION
        value: 1.0.0
      - key: HOST
        value: 0.0.0.0
      - key: AUTO_REFRESH
        value: "false"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "120"
      - key: REFRESH_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: REFRESH_RATE_LIMIT_MAX_REQUESTS
        value: "20"
      - key: JSON_BODY_LIMIT_BYTES
        value: "65536"
      - key: CORS_ORIGIN_ALLOWLIST
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
